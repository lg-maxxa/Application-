name: Build NearbyChat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Project Repair
        run: |
          # 1. Create Android folder (This overwrites your pubspec.yaml)
          flutter create --overwrite --platforms android .
          
          # 2. CRITICAL: Restore your original pubspec.yaml from GitHub
          git checkout pubspec.yaml
          
          # 3. Organize your code into the lib folder
          mkdir -p lib/core/theme
          mv main.dart lib/ 2>/dev/null || true
          mv app.dart lib/ 2>/dev/null || true
          mv injection.dart lib/ 2>/dev/null || true
          mv app_theme.dart lib/core/theme/ 2>/dev/null || true

      - name: Build and Generate
        run: |
          # Now that the correct pubspec is back, get the packages
          flutter pub get
          
          # Generate the missing 'init' code for injection
          flutter pub run build_runner build --delete-conflicting-outputs
          
          # Final build
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NearbyChat-Release
          path: build/app/outputs/flutter-apk/app-release.apk
