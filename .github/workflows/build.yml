name: Build NearbyChat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Project Repair
        run: |
          # 1. Create Android folder (This overwrites some generated files)
          flutter create --overwrite --platforms android .
          
          # 2. CRITICAL: Restore original pubspec.yaml and source files from git
          git checkout pubspec.yaml
          git checkout -- lib/ test/

      - name: Build and Generate
        run: |
          # Now that the correct pubspec is back, get the packages
          flutter pub get
          
          # Generate the missing 'init' code for injection
          flutter pub run build_runner build --delete-conflicting-outputs
          
          # Run tests
          flutter test
          
          # Final build
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NearbyChat-Release
          path: build/app/outputs/flutter-apk/app-release.apk
