name: Build NearbyChat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Platform and Organize Code
        run: |
          # 1. Generate Android folders
          flutter create --overwrite --platforms android .
          
          # 2. Move your files into the lib folder
          mkdir -p lib/core/theme
          mv main.dart lib/ 2>/dev/null || true
          mv app.dart lib/ 2>/dev/null || true
          mv injection.dart lib/ 2>/dev/null || true
          mv app_theme.dart lib/core/theme/ 2>/dev/null || true

      - name: Install and Generate Code
        run: |
          # Force an update of all dependencies to resolve the conflicts
          flutter pub upgrade --major-versions
          flutter pub get
          
          # Use 'flutter pub run' instead of 'dart run' for better compatibility
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: |
          flutter build apk --release
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NearbyChat-Release
          path: build/app/outputs/flutter-apk/app-release.apk
