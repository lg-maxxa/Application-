name: Build NearbyChat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Organize and Build
        run: |
          # 1. Create the required folder structure
          mkdir -p lib/core/theme
          
          # 2. Move your uploaded files into the lib folder
          mv main.dart lib/ 2>/dev/null || true
          mv app.dart lib/ 2>/dev/null || true
          mv injection.dart lib/ 2>/dev/null || true
          mv app_theme.dart lib/core/theme/ 2>/dev/null || true
          
          # 3. Create Android platform files
          flutter create . --platforms android --force
          
          # 4. Install dependencies
          flutter pub get
          
          # 5. Build the APK
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NearbyChat-Release
          path: build/app/outputs/flutter-apk/app-release.apk
          
