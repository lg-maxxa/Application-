name: Build NearbyChat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Project Files
        run: unzip nearby_chat_app.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Repair Project and Install Dependencies
        run: |
          cd generated_flutter_app
          # This generates the missing android/ folder
          flutter create . --platforms android 
          flutter pub get

      - name: Run Code Generation
        run: |
          cd generated_flutter_app
          # Fixed the 'dark' typo to 'dart'
          dart run build_runner build --delete-conflicting-outputs

      - name: Build Release APK
        run: |
          cd generated_flutter_app
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearbyChat-Release
          path: generated_flutter_app/build/app/outputs/flutter-apk/app-release.apk
          
