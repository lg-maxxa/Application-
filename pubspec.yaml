name: nearby_chat
description: Offline P2P messaging with WhatsApp-like UI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_p2p_connection: any
  nearby_connections: ^4.0.0
  permission_handler: any
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5
  get_it: ^7.6.7
  injectable: ^2.3.2
  go_router: ^13.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.20
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.2
  encrypt: ^5.0.1
  pointycastle: ^3.7.4
  crypto: ^3.0.3
  cached_network_image: ^3.3.1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  photo_view: ^0.14.0
  intl: ^0.19.0
  flutter_svg: ^2.0.9
  uuid: ^4.4.0
  qr_flutter: ^4.1.0
  share_plus: ^8.0.0
  logger: ^2.2.0
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.9
  drift_dev: ^2.15.0
  injectable_generator: ^2.4.1
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  mockito: ^5.4.4
  bloc_test: ^9.1.7

dependency_overrides:
  mime: ^1.0.4

flutter:
  uses-material-design: true
  
